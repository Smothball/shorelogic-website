<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 95" role="img" aria-label="Shore Logic AI Advisors">

  <!-- ═══════════════════════════════════════════
       COMPASS ICON  (96×96 box, center 48,48)
  ════════════════════════════════════════════ -->
  <g transform="translate(0,-1)">

    <!-- Outer tick ring -->
    <circle cx="48" cy="48" r="44" fill="none" stroke="#8A95A5" stroke-width="0.8" stroke-dasharray="2.5 5" stroke-dashoffset="1"/>

    <!-- Compass body ring -->
    <circle cx="48" cy="48" r="38" fill="#F3EFE9" stroke="#12263F" stroke-width="1.5"/>

    <!-- Cardinal points (N / S / E / W) — large diamonds -->
    <path d="M48,9 L52.5,29 L48,22 L43.5,29 Z" fill="#12263F"/>
    <path d="M48,9 L52.5,29 L48,22 L43.5,29 Z" transform="rotate(180,48,48)" fill="#12263F"/>
    <path d="M48,9 L52.5,29 L48,22 L43.5,29 Z" transform="rotate(90,48,48)"  fill="#12263F"/>
    <path d="M48,9 L52.5,29 L48,22 L43.5,29 Z" transform="rotate(270,48,48)" fill="#12263F"/>

    <!-- Diagonal points (NE / SE / SW / NW) — smaller -->
    <path d="M48,18 L50.5,29 L48,25 L45.5,29 Z" transform="rotate(45,48,48)"  fill="#8A95A5"/>
    <path d="M48,18 L50.5,29 L48,25 L45.5,29 Z" transform="rotate(135,48,48)" fill="#8A95A5"/>
    <path d="M48,18 L50.5,29 L48,25 L45.5,29 Z" transform="rotate(225,48,48)" fill="#8A95A5"/>
    <path d="M48,18 L50.5,29 L48,25 L45.5,29 Z" transform="rotate(315,48,48)" fill="#8A95A5"/>

    <!-- Inner filled ring -->
    <circle cx="48" cy="48" r="21" fill="#12263F" stroke="#8A95A5" stroke-width="0.8"/>

    <!-- Circuit ring -->
    <circle cx="48" cy="48" r="16.5" fill="none" stroke="#8A95A5" stroke-width="0.8"/>

    <!-- Circuit grid lines -->
    <line x1="33" y1="48" x2="63" y2="48" stroke="#8A95A5" stroke-width="0.7"/>
    <line x1="48" y1="33" x2="48" y2="63" stroke="#8A95A5" stroke-width="0.7"/>

    <!-- Circuit inner box -->
    <rect x="41" y="41" width="14" height="14" fill="none" stroke="#8A95A5" stroke-width="0.6"/>

    <!-- Circuit corner nodes -->
    <circle cx="41" cy="41" r="1.3" fill="#D0D5DD"/>
    <circle cx="55" cy="41" r="1.3" fill="#D0D5DD"/>
    <circle cx="41" cy="55" r="1.3" fill="#D0D5DD"/>
    <circle cx="55" cy="55" r="1.3" fill="#D0D5DD"/>

    <!-- Circuit axis nodes -->
    <circle cx="48" cy="33" r="1.3" fill="#8A95A5"/>
    <circle cx="48" cy="63" r="1.3" fill="#8A95A5"/>
    <circle cx="33" cy="48" r="1.3" fill="#8A95A5"/>
    <circle cx="63" cy="48" r="1.3" fill="#8A95A5"/>

    <!-- Center dot -->
    <circle cx="48" cy="48" r="2.8" fill="#D0D5DD"/>

  </g>

  <!-- ═══════════════════════════════════════════
       VERTICAL DIVIDER
  ════════════════════════════════════════════ -->
  <line x1="106" y1="14" x2="106" y2="81" stroke="#D0D5DD" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════
       TEXT LOCKUP
  ════════════════════════════════════════════ -->

  <!-- "SHORE LOGIC" -->
  <text
    x="120" y="51"
    font-family="'Rockwell','Arvo','Georgia',serif"
    font-size="31"
    font-weight="700"
    letter-spacing="1.5"
    fill="#12263F">SHORE LOGIC</text>

  <!-- Rule above ADVISORS -->
  <line x1="120" y1="60" x2="416" y2="60" stroke="#8A95A5" stroke-width="0.7"/>

  <!-- "ADVISORS" -->
  <text
    x="268" y="75"
    font-family="'Inter','Arial',sans-serif"
    font-size="10.5"
    font-weight="500"
    letter-spacing="5.5"
    fill="#8A95A5"
    text-anchor="middle">ADVISORS</text>

  <!-- Rule below ADVISORS -->
  <line x1="120" y1="82" x2="416" y2="82" stroke="#8A95A5" stroke-width="0.7"/>

</svg>
